name: CI

on:
  push:
    branches: [main, dev, test]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Shell syntax (bash -n)
        run: |
          for f in install.sh .claude/hooks/*.sh .cursor/hooks/*.sh; do
            bash -n "$f"
          done

      - name: Shellcheck
        run: |
          shellcheck -S warning install.sh .claude/hooks/*.sh .cursor/hooks/*.sh

      - name: JS syntax (node --check)
        # Skill scripts run with the agent's rights just like hooks do, so they get the
        # same syntax gate. This is hygiene, not a security control — it catches broken
        # code, never malicious code. Integrity of vendored skills is enforced by the
        # sha256 pin in skills-lock.json (check-skills.js).
        run: |
          # .mjs matters: impeccable ships 61 of them and zero plain .js in most subdirs.
          while IFS= read -r f; do
            node --check "$f"
          done < <(find .claude/hooks .cursor/hooks .claude/skills -type f \( -name '*.js' -o -name '*.mjs' \))

      - name: Python compile
        run: |
          python3 -m py_compile .claude/skills/caveman-compress/scripts/*.py
          python3 -m py_compile .claude/skills/ui-ux-pro-max/scripts/*.py

      - name: JSON valid
        run: |
          for f in .mcp.json .cursor/mcp.json .claude/settings-template.json .cursor/hooks.json skills-lock.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done

      - name: Unit tests (JS)
        run: node --test

      - name: Python lint (ruff — pyflakes + syntax errors)
        # Kit-authored scripts only. Vendored skills are pinned by sha256 in
        # skills-lock.json — linting them to upstream's style would mean patching pinned
        # files and rebaselining the hash on every upstream nit, which defeats the pin.
        # Their syntax is covered by the py_compile step above.
        run: |
          python3 -m pip install ruff
          ruff check --select F,E9 --ignore F811 .claude/skills/caveman-compress/scripts/

      - name: Python unit tests
        run: python3 -m unittest discover -s test -p 'test_*.py' -v

      - name: MCP package version check
        run: node .claude/scripts/check-mcp-versions.js

      - name: cursor-rules sync check (.claude/rules vs .cursor/rules)
        run: node .claude/scripts/check-cursor-sync.js

      - name: Skills check (frontmatter, skills-lock, install.sh, symlinks)
        run: node .claude/scripts/check-skills.js

      - name: Prompt-injection audit of skill/rule/agent content
        # Static scan of everything the agent reads as instructions. Audits find prompt
        # injection in roughly a third of public skills, and a vendored skill runs with
        # the user's rights — so the file is the thing to scan. Signature classes follow
        # NVIDIA garak's attack taxonomy (latentinjection, xss/exfiltration, promptinject,
        # encoding); garak itself probes a live model endpoint and cannot audit files.
        run: node .claude/scripts/audit-skill-content.js

      - name: Install smoke test
        run: |
          mkdir -p /tmp/kit-target
          bash install.sh /tmp/kit-target --yes --stacks all
          test -f /tmp/kit-target/.claude/hooks/safety-guard.js
          test -f /tmp/kit-target/.cursor/hooks/safety-guard.js
          # Skills must land in BOTH harnesses — Cursor shipped without any for
          # several releases because nothing asserted this.
          test -f /tmp/kit-target/.claude/skills/impeccable/SKILL.md
          test -f /tmp/kit-target/.claude/skills/ux-core/SKILL.md
          test -f /tmp/kit-target/.cursor/skills/impeccable/SKILL.md
          test -f /tmp/kit-target/.cursor/skills/ux-core/SKILL.md
          # Every rule in the repo must reach the target with --stacks all. install.sh
          # copied "frontend-standards" — a name that has not existed since v0.1.0 — so
          # Vue users silently got no Vue rule at all. A name list nobody diffs rots.
          for f in .claude/rules/*.md; do
            test -f "/tmp/kit-target/$f" || { echo "MISSING in target: $f"; exit 1; }
          done
          test -f /tmp/kit-target/.cursor/rules/global-standards.mdc
          test -f /tmp/kit-target/.cursor/rules/external-content.mdc
          # No skill may install as a symlink into a user's project.
          ! find /tmp/kit-target/.claude/skills /tmp/kit-target/.cursor/skills -type l | grep -q .
